# llama-proxy 配置示例
# 复制此文件为 config.yaml 并根据需要修改

# =============================================================================
# 服务端配置（在VPS上运行）
# =============================================================================
server:
  # HTTP API监听地址
  # AI应用程序将使用此地址访问OpenAI兼容API
  listen: ":8080"
  
  # WebSocket监听地址（可选）
  # 如果不设置，将使用 listen 地址
  # ws_port: ":8081"
  
  # 加密密钥（必须配置，至少16字符）
  # 服务端和客户端必须使用相同的密钥
  # 建议从环境变量读取: key: "${LLAMA_PROXY_KEY}"
  key: "your-secret-key-here-change-it"
  
  # 最大并发请求数
  # 根据VPS资源调整，2GB内存建议设为30-50
  max_concurrent_requests: 50
  
  # zstd压缩级别 (1-22)
  # 1 = 最快，压缩率低；22 = 最慢，压缩率高
  # 建议: 3Mbps带宽使用15-19，更高带宽可用更低级别
  compression_level: 15
  
  # 是否启用监控端点
  enable_metrics: false
  
  # 监控端点端口（仅在enable_metrics为true时生效）
  metrics_port: ":9090"

# =============================================================================
# 客户端配置（在本地运行）
# =============================================================================
client:
  # 服务端WebSocket地址
  # 替换为你的VPS IP或域名
  server_ws: "ws://your-vps-ip:8080"
  
  # 本地llama-server地址
  # llama-server 默认运行在 8080 端口
  llama_url: "http://127.0.0.1:8080"
  
  # 加密密钥（必须与服务器相同）
  # 建议从环境变量读取: key: "${LLAMA_PROXY_KEY}"
  key: "your-secret-key-here-change-it"
  
  # 重连间隔（断开后多久尝试重连）
  reconnect_interval: 5s
  
  # 最大并发请求数
  # 根据本地机器资源调整
  max_concurrent_requests: 10
  
  # zstd压缩级别（1-22）
  # 建议与服务端使用相同级别
  compression_level: 15

# =============================================================================
# 日志配置
# =============================================================================
log:
  # 日志级别: debug, info, warn, error, fatal
  # debug: 显示所有日志（包括WebSocket消息内容）
  # info: 显示连接和请求信息
  # warn: 只显示警告和错误
  level: "info"
  
  # 日志格式: text, json
  format: "text"
  
  # 日志输出: stdout, stderr, 或文件路径
  output: "stdout"

# =============================================================================
# 使用说明
# =============================================================================
# 
# 1. 服务端部署（VPS）:
#    - 复制此配置到 /etc/llama-proxy/config.yaml
#    - 修改 key 为强密码
#    - 运行: llama-proxy server --config /etc/llama-proxy/config.yaml
#
# 2. 客户端运行（本地）:
#    - 复制此配置到本地
#    - 修改 server_ws 为你的VPS地址
#    - 确保 key 与服务端相同
#    - 运行: llama-proxy client --config config.yaml
#
# 3. 使用环境变量（推荐）:
#    服务端:
#      export LLAMA_PROXY_SERVER_KEY="your-secret-key"
#      llama-proxy server -l :8080
#
#    客户端:
#      export LLAMA_PROXY_CLIENT_KEY="your-secret-key"
#      export LLAMA_PROXY_CLIENT_SERVER_WS="ws://your-vps:8080"
#      llama-proxy client
#
# 4. AI应用程序配置:
#    将 OpenAI API base URL 设置为: http://your-vps-ip:8080/v1
#    无需设置 API key，代理会透传请求
#
# =============================================================================
# 安全建议
# =============================================================================
#
# 1. 使用强密码（至少16字符，包含大小写、数字、符号）
# 2. 生产环境使用 WSS (WebSocket Secure): wss://your-domain:443
# 3. 使用防火墙限制VPS端口访问（只允许WebSocket端口）
# 4. 定期更换加密密钥
# 5. 使用 fail2ban 防止暴力破解
#
# =============================================================================
# 性能优化建议（针对2核/2GB/3Mbps VPS）
# =============================================================================
#
# 1. 压缩级别: 15-19（平衡CPU和带宽）
# 2. 最大并发: 30-50（防止OOM）
# 3. 使用流式传输（stream: true）减少内存占用
# 4. 监控流量使用，避免超出200GB/月限额
#
